body:
  text: 大清內閣掌譯番蒙諸文西番學總管儀賓工布查布譯并解述如是我聞一時佛在舍衛國祇樹給孤獨園與諸菩薩聲聞弟子一切人天龍神無量眷屬大衆俱正乃世尊因為母說法將升忉利天土時也爾時賢者舍利弗向佛敬禮而作是言世尊不住斯間若有善人不勝懷慕思覩世尊願造容像者則其法如何為之佛言善哉舍利弗我今暫升天土未旋斯間或示無餘涅槃之後若有善人思覩瞻仰及為自他利益作福田故願造容像者則須遵準量度法為之如來身量縱廣相稱如尼拘𡀩二合陀樹滿自一尋今其體肢大小節分竪橫制度起從頂髻略說於汝諦聽善思念之縱廣猶竪橫也尼拘𡀩二合陀樹名梵語也華云無節狀如柳此樹株身之高分與其周圍垂梢彼此間深裏向竪橫相等佛身亦如是從頂至腳底之縱分與其平舒兩肱二中指尖相去間廣分無不相稱各滿自己一尋也於是世尊即說伽陀日伽陀梵語也華云偈義詳辭約為學者易持也以自手指量百有二十指肉髻崇四指髮際亦如此按西來專業像家量度法微塵髮梢蟣芥子麥後復增八倍一麥分為一小分二麥並布為一足四足為指又謂中分十二指為搩音桀以手度物曰搩俗謂大扎亦謂大分倍搩為肘四肘為尋即一庹俗作托也以自手指量者言現今所造佛像大小幾許即以自身手指量之應得自己一尋之分量即以自搩十搩以自指百二十指之分也肉髻佛頭巔頂上有肉塊高起如髻形似積粟覆甌高四指由其根下至髮際之分量亦如此四指也若胎偶則多得半指譬如現今欲造立像一丈二尺則此丈二即是本像之一尋而其一寸即本像之一指分如是竪橫各得百二十指乃㡧像之比量是為戒生大教王經中說量度法之義也分別其節目則肉髻髮際頸喉各縱四指共湊成滿一搩也面輪及自喉至心窩由是至肚臍由是至陰藏各一搩是上身之五搩也牌樞即胯骨也膝骨足踵各縱四指共湊一搩股脛各二搩是下身之五搩合較滿十搩十搩即一尋每搩十二指十箇十二即一百二十此乃比量竪縱之分法也度橫廣之法則自心窩而上比至六指處胎偶則六指零一足處從正中橫量至兩腋各一搩由是順手至肘以裏兩臑各長二十指由是至手腕兩臂各十六指由是兩中指梢各一搩共計亦百二十指也若造坐像其法陰藏中為正中即身之半也其下添四指處平彈絣線絣音伻以繩直物也而彼與梵絣㡧像之主心準繩曰梵絣相接處即跏趺交會之下隅也又加四指為法身之下邊寶座之上面也從趺會下隅起直上立彈絣線比至眉間白毫中之分量與其趺坐雙膝外邊相去間闊分長短平等而兩踵相離分得四指焉面輪竪縱度帶半十二指分三為額鼻及頦俱得一首面與四體釋典謂之五輪帶半加半指也言面之長徑一搩加半指將此一搩半指分為兩箇四指及一箇四指半三分而自髮際至山根之眉間白毫中心額顱之崇作一箇四指分由是至準頭鼻之長得其一四指分由是至頦下邊得其帶半指之一分依胎偶而言之也若㡧像則不加半指只本分一搩平分三分而額鼻頦各均得四指之分也凡搩分多加半指者皆是胎偶之比量法是乃時輪大教王經中說制度之義也夫胎偶者有骨肉之相因以凸高顯露故皮面須加每搩上半指也面輪之半指在頷頦上身之湊成一搩分上應加之半指在髮際下身之湊成一搩分上應加之半指在踵際其餘心窩肚臍陰藏此三處各間加半指股脛各加滿指此兩骨節本來各有二搩故合而宜加滿指之分也是縱裏向共總增出五筒滿指分也自胸中平量至兩腋間之分各加半指兩肘各得三足零三分足之一兩手腕各有二足零三分足之二兩手頭各加半指如是廣裏向共增出五滿指合較縱廣俱各得百二十有五指也至於梵絣與𭘭木胎偶之主心木也之制則更無有少異矣密藏倚在脊尖尾骶之前故數上身以上六十指脾樞雖貼於脊骨而在密藏之上邊其因結援腿根為足之生處故數下身以下六十指然而須知其交接法為要安𭘭木法見裝藏章鼻準上胎偶則添一滿指之分而去其髮際之半指鼻柱高一指亦不在正數之內㡧像之準頭及頦下亦各添半指而不言增添何也蓋凡繪事筆法借高鋪地凹凸增添雖有幾分增出之筆仍有被所遮掩之分因地面平坦故雖有增添之劃文而無加益之實跡也下分四指半頦身只二指廣向十六足深分徑四指下分即前說三分之末分也言面之縱分雖分三分而上分為額中分為鼻各得四指之分其末分為頷頦者連嘴共有四指加半指也頦身者自下唇根至於頦下際也其縱分只二指而飽滿光滑旁曠而邊圓頦之廣分寬裏向十六足即四指若笑容則隨宜增加分量其自頦際至喉深分亦四指有沿邊疊摺似重頦之相焉凡胎偶之凸凹分除非頦際及梢尖等處可畫之外皆㡧像之所不得而用也上唇長二指寬有其半矣中顯頻婆形邊角各一指口長度四指賢者須要知牙齒數四十堅密白淨齊下唇長六足寬深亦如是人中凹槽闊三分指之一從鼻柱根至閉口處直量一指半上唇之長分二指寬有其半者言二指之半即一指也唇之寬厚分三足而人中槽下際凹入嘴唇邊一麥之分其外尖凸出一足之分似乎頻婆形與前說之三足合為四足即一指矣頻婆梵語果名華云相思果色丹而潤蓋不但喻其形兼唇之色而言之矣兩邊角各一指總口之長分有四指也齒數具正四十常人但有三十二三十六齒堅固齊密潔淨瑩白似乎𤥭𭸾然平素不露牙齒也下唇長指半寬分其邊與齒根相去亦如是指半而其一指即厚之分上面有凹承上唇之凸尖下面亦有微凹平且闊合之形如弓弝其邊兩彎垂外際比上唇之寬分各多一麥二唇吻之而竪裏向直量則只得一滿指口之兩角寬半麥之分其梢向上翹起如華瓣之尖美妙含笑之容具為口相也人中槽闊三分指之一而深裏向宜得一足零一麥之多半分矣鼻寬二指量準高指半矣鼻孔圓且藏竅闊有半指雙翹勻真圓鼻柱橫半指鼻之寬闊略量有二指雙目前角間為山根高寬俱一指浸長高而直美鼻梁作略顯不顯之些微弓彎準頭圓滿高分連鼻柱一指半鼻孔規圓而睨視之不見竅孔闊量半指深分作一指鼻之兩翹彎回規圓均美凸凹真刻厚分各得一足半鼻柱及兩孔各寬半指共合鼻身寬二指一足也鼻孔之邊與鼻柱相齊高分有一指焉目間曠八足長分應四指白黑睛三分各分得滿指黑珠作五分正中是眸子眼寬只一足其胞有三指式如蓮華瓣清瑩金精色印堂白毫地廣帶半一指眉如初月牙中高長四指雙目之間曠空處闊二指自白毫而下比至二指之地向兩旁橫量各至一指處為大眼角胎像則加半指因為山根之高分也由是向外比兩旁各去四指處為小眼角尖正對耳孔中間兩角各縱半指合得一指之分而餘三指均分其正中一指作黑珠在兩邊之二指作白珠又彼黑珠平分五分而以其中分為眸子色甚黑而發金光如電眸子邊圍畫金圈以相之眼之寬分只一足為入定之相形似長弓其弝前面之寬只一麥半之分弝後面之寬分才滿一足白珠雖有一指只見其三足半之分而近於眼兩角之各得一麥分則不得見焉眼胞高一足闊三指形如蓮華瓣白睛珍珠色黑睛紺青色分明潤美光滑眼角肉淡紅色眼睫亦紺青色而殊勝如牛王睫長有一麥之分焉印堂安白毫之地也自髮際以下比三指處作白玉毫清淨柔軟右旋彎轉而末向上底盤圓滿廣闊一指由是而下比三麥半之處起向兩旁橫量各至足半處即兩眉前梢也由是至後梢長四指後梢對耳尖底一足形似初二三之月牙眉之中身寬處有二麥之分而兩梢漸細也耳廣有二指尖等眉中齊洞門寬四足竅孔得半指耳朵高四麥橫分應滿指耳內上下略四分指之一連槽深分總二指加半指耳葉四指半耳垂長五指輪郭髮際邊可愛盡難比耳之前面橫寬平量二指畫像相同背面寬指半其尖齊比眉之中洞門闊一指竅孔半指俱圓而不顯耳朵俗謂耳樁遮攬洞門旁立豎半指橫一指而中有凹正對小眼角上凸圓而上凸匾形如將開未開之華朵洞門外耳槽橫一指一足胎偶則連其隰深分得二指加輪郭之半指共總二指半也耳內上下括而言之也四分指之一即一足也分別而言之則耳槽邊厚一足向裏彎緣耳葉而下至於離底根一指斜對耳朵處轉起一凸高亦一足形類耳朵復落彎回而為底根暗合與耳朵根相連槽邊上身分作兩岔厚分各亦一足其內枝漸細而尖伏入藏於耳輪綱邊之下外枝稍漸漸散沒從其岔處上至耳尖一指半闊一指一足耳之輪綱上稍自槽內與耳朵相隔竅孔反勾而生起稍稍增高加寬分以轉上過耳朵之上彎至耳根上邊以上寬一足而邊陵向裏彎而下至耳葉外邊之半處以下漸減而細不斷不沒至於耳根底相對處以下綏然而為取焉取之列切耳垂也總說之耳葉縱四指半而直立耳垂長五指寬指半而面向前復言耳輪與髮際之邊俱有高底進出曲彎折角美妙可愛難以言辭可盡詮者也凡此等處當竭盡工力隨宜而致其美妙乃為合法首圍面三倍如寶蓋適意兩耳面相去十有八布指復其背後間相去十四指合較周匝度三十有六指頸瓶廣八指圓二十四指頭相規圓觀之適意似寶蓋頂對髮際處圍繞四十五指普邊增二指為純髮之分兩邊與耳邊齊肉髻周十二指其上無見髻相寶髻高二指周六指桃形金色對兩耳洞門處橫比之徑十八指畫像則十二指耳背根彼此相去十四指共計三十二指而兩耳根盤各一指鼻之高分得二指共三十六指也凡物之規圓者其正中之橫徑分幾許則其周圍之量必得若許三分佛面縱橫徑十二指因對面之正中處周圍應準三十六指也故啓句曰首圍面三倍也脖項規圓如瓶頸廣度八指巨周二十四指喉下有三級紋自頷根以下比一足半處作上紋由是以下一指零一足處作中紋由是以下二指處作下紋俱圓彎而兩梢漸細向上合項之橫以為長分焉頸邊至肩甲平量十二指手長總四搩臑長二十指臂有十六指巨周亦如此肩尖圓且滿根圍二十四從起中指尖手頭正一搩掌縱應七指廣分是五指掌肉平飽滿滋潤光滑赤顯諸吉祥紋螺輪華鉤飾將指之長分前面得五指此指梢節中食指之尖至屈指之長分比將矮半指小梅指頭尖至屈末半節四皆具三節甲蓋半節矣巨指長四指其周亦如是此指只兩節甲遮如前矣巨指食指根相去為三指小指根以下四指半至基自頸喉之根外邊橫比至肩頂十二指零二足而若自頸之正中向兩旁橫量則各十六指肩頂凸處圓美滿盈闊四指從肩頂以下直至兩腋各六指從腋斜至肩膀邊九指自肩至肘謂之臑臑之長分及其根之巨周俱二十指徑寬分得其三分之一若垂手勢則兩肩橫制邊各加四指自肘至腕曰臂臂之長分及其根之周量皆十六指寬得其三分之一手頭自中指尖至手腕也長一搩手肘三足零三分足之一手腕二足零三分足之二此兩分畫像之所不用也手掌縱七指廣五指平坦充滿光滑色如丹砂掌中心有千輻輪相而其外圍繞具右旋螺貝吉祥字蓮華慈鉤慧劍等諸般福德相紋細密深且真刻普遍散列為嚴飾將指中指也其指在掌面之長分五指此指者即指將指而言之也食指二拇指也其長至中指末節之半屈指無名指也其長分比將指矮半指此三指之生根大概相齊而中指根節微乎高小指根比中指根矮半指而其梢與屈指末節縫過一足以上三指各具三節而自掌面觀之節節長分一般自背面則將指上節長二指中節長二指半下節三指手背一節長四指半餘三指亦如是推度而隨宜分為四節指根巨周得其長制三分之二指梢巨周得三分之一巨指者大拇指也長周俱四指只有兩節其根比食指根矮三指而自其根至手腕五指手腕巨周十二指寬四指從掌基裏邊至將指根縱分七指廣分極寬處亦然對生指處寬五指掌基寬六指諸指末節上半被爪甲蓋之甲形如𭺢瓦色如紅銅而明亮其梢邊離肉分一麥而色亮白如琉璃無垢也巨指下節與食指根及餘三指下節俱以薄皮相連如鵝王掌表裏明瑩并展不歉指底面色與掌色同指肚飽滿光滑字紋從中起自左向右旋繞指甲根邊沿皮寬半麥之分總言手長四搩不露骨節而柔和如意屈伸悠然猶如象鼻之彎轉焉項心臍乳間帶半十二指自乳尖至腋平量六指矣兩腋相去度二十有五指胸堂周圍繞正五十六指自從雙乳絣十六指至臍臍圓有摺旋深闊皆一指此處腰圍繞四十有八指自咽喉至心窩由是至肚臍各間俱一搩零半指畫像不加半指乳尖闊二足高滿足其圓光寬一足周三指醬色由是至兩腋各有六指兩腋相去間前胸後背各二十五指腋下脅肋厚分各八指對此處周圍六十六指兩乳相去間一搩胎偶加半指畫像不用加處如前後皆倣此此處身之前後各橫闊二十二指半兩肋厚各滿搩共計周圍六十九指自乳尖以下二指處身前後闊各二十指肋厚各十指共六十指臍上比一指地乃腰之極細處也橫闊十五指巨周四十五指自乳至臍十六指兩乳至兩肩各一搩臍之闊深皆一指其孔圓自左右旋向內之摺而不顯露對此處身前後寬十六指圍繞四十八指焉髀樞邊向裏平量二十四指從臍至陰藏滿搩加半指陰藏如馬王密囊有四指髀樞胯骨之上際與臍分之橫線下離四指而下結連腿根兩胯彼此兩外邊相去闊二十四指周圍五十四指自臍至陰藏一搩對此處之闊二十五指胯間為三角形正中縱量八指每角各方十指其前角即按密藏處後兩角即為兩臀尖處也陽莖縱四指其頂二指周六指向內縮藏不露同馬王陰相密囊縱垂五指闊四指而亦不令顯露髀骰下邊之制與胯下齊臂尖圓之處縱廣俱八指高分應三指焉股奘三十二長二十五指近膝圍繞度二十有八指連節膝四指踝骨縱三指鹿腨纖圓直長二十五指中間周圍繞二十有一指踝圍十四指其邊寬二指以下四指踵凸闊得三指足底竪一搩厚分有二指四指俱三節甲遮末半矣將指惟二節圍繞五指是長度滿三指食指亦如是十六次八分中屈及小指大指厚六足餘漸止滿指指根連縵網趺高如龜背掌平滿柔軟滋潤色丹赤輪螺吉祥字諸妙相深微如是如來相一切福德備兩股之當中奘分巨周三十二指闊分得其三分之一根之闊一搩周三搩長裏向二十五指即二搩依胎偶而言之也近膝處圍繞二十八指膝蓋骨竪四指闊九指巨周應得二十七指而凸阜上均得一指故作二十八指也腨腓腸也直且纖圓如鹿王腨其長分同股之量當中巨周二十一指腓梢巨周十四指踝骨縱廣俱有三指而不露自踝後邊橫比之攬筋寬二指足踵縱分四指其凸尖闊三指盈滿規圓足底長一搩將足以大拇指為將指食二指肚面長二指共一搩二指生指根處寬六指腳心中寬五指踵底寬四指趺高飽滿似龜背其生根比踵之生根高半指足底裏邊厚二指向外漸薄而至外邊厚分只一指將指旁邊及背面皆長三指巨周五指厚六足食持長分與將指同而厚分微淺餘三指亦隨腳底漸次薄而至於小指厚分只一滿指為止其各長分則以食指平分為十六分以此十五分量中指以中指分為八分以此七分量屈指以屈指分為八分以此七分量小指巨周俱各以其長分比量此四指從底面觀之似兩節而實三節爪甲蓋其末節之半色形及縵網俱同手指足掌平滿柔軟滋潤而色如丹砂中心有輪相其圍螺貝吉祥字等諸般妙紋具全與手掌相同收尾總結之曰如是如來殊特妙相皆悉如來宿因屢劫積功修行力以自然感獲一切福德莊嚴全備非但如世間紅福果報人天尊貴容貌所得比喻者也經文大旨依義詮解準法具明至於周身骨節脈絡隱伏藏密為粗為細凸凹曲彎增減各處漸起稍落不害均勻等筆舌所難詮述者則賴良師信徒之相得授受之明爽聰慧變通之功力也右像法乃是三世尊佛彌陀藥師七如來八十八佛賢劫千佛等凡離塵修行相者亦謂之化身相一概以此為準式若夫無量壽及嚧舍那毗嚧等五部如來一切受用五欲祕密相者亦謂之報身相則寶髻作五股金剛杵之上半節其崇高之分及巨周分量俱同前說寶髻之分量髮攢高十指肉髻含於其中而其根巨周十二指肉髻上邊處周十指頂周八指此兩節俱被金帶緊圍餘髮編作四繩從兩肩下垂而其梢略過手肘其餘尺寸形相一一同前也衣服莊嚴則三尊等化身佛相皆宜著上下法衣五衣著下身七衣著上身五部等報身佛相以八件寶飾為莊嚴何者為八件一寶冠即五佛冠也二耳環三項圈四大瓔珞五手釧及手鐲六腳鐲七珍珠絡腋八寶帶也謂之大飾耳垂上前臨優波羅華冠左右下垂寶帶腳鐲上圍繞碎鈴戒指等謂之小飾隨宜妙繒雲肩飄翻為上衣雜色長短重裙為下裳論座位則有備便之別備者義制全備也有通別二者之分通者即獅子寶座諸佛及經函塔幢所通用也別者謂祕密五部主佛各有宜用分別如來部主毗盧佛坐獅子王座金剛部主阿閦佛象王座寶部主寶生佛馬王座蓮華部主彌陀佛孔雀王座羯磨部主不空佛鵬鳥王座若他佛及諸佛母但知其所屬何部則隨其部主而用之詳其義制則獅子喻無畏之相象大力相馬神足相雀自在相鵬無礙相背光制有云六拏具者一曰伽噌拏華云大鵬乃慈悲之相也鵬鳥與慈悲梵名相近故借其音而因以有形表示無形之義餘皆倣此二曰布囉拏華云鯨魚保護之相也三曰那囉拏華云龍子救度之相也四曰婆囉拏華云童男福資之相也五曰舍囉拏華云獸王自在之相也六曰救囉拏華云象王善師之相也是六件之尾語俱是拏字故曰六拏具又以合為六度之義其尺寸色飾則西番書有上中下之分且漢地舊有其式故不具録所云便者則隨便取用之辭如蓮華座月輪墊是也怒相用日輪形規圓或隨照跏趺之式亦可座厚分十指墊厚二指也佛說此經已賢者舍利弗及諸弟子一切大衆聞佛所說皆大歡喜信受奉行右經梵名舍思多二合羅一尼拘𡀩二合陀波哩曼那羅二佛陀波羅二合底麻三羅乞善二合那引麻四譯曰舍思多二合羅開示謂經也尼拘𡀩二合陀波哩曼那羅縱廣平等如無節樹佛陀波羅二合底麻佛像羅乞善二合那引麻相制名謂順其辭而合貫之曰開示佛像縱廣平等如無節樹相制名謂經今掇其義而約名之云佛說造像量度經按此經凡有三譯一疏而是本乃西天三藏達磨多囉與亞哩弄地名譯師查巴建參同在恭唐邑翻成者也愚雖不肖承諸善智師慈力對勘諸經以彼準此修正其訛填補其缺但以辭達為務至於纂述文義以及附載同類編章則悉遵時輪戒生二經以為考正云爾造像量度經續補烏朱穆秦奇渥溫工布查布述一菩薩像八大適子等已成正覺而由其往昔願力感化應身菩薩相者彼像造法南面正坐與佛像無異若夫陟位歷地之菩薩位大乘五位也一資糧位二加行位三通達位亦名見道位四修習位五究竟位也地即十地宜置旁列與侍奉至尊諸像相類其制身之縱廣約等十搩每搩十二指共為百二十指而為胎偶之增法除非鼻準及頦下各加半指之外可宜不加增處不必加增其必得加分處隨宜加分各致其曲而俱不可令彀半指像傳有附載云凡夫身量竪八十四指橫九十六指為止縱廣不等因其二萬一千六百業息故蓋一晝夜之吸呼二萬一千六百息也內分十二節蓋隨十二時也每節分得息千八百菩薩自發心進步行道時業息漸滅而隨其滅幾數以慧息遂長幾數如是方得初地第三位歡喜地通達位則業息滅盡一節千八百而慧息長滿一節千八百以是形於外相得縱廣相等百八指如是漸進踐至第九善慧地每地兩息減增各一節而形相各增二指方至於第十法雲地境即如前減增一節此共滿十節而形相指分共得百二十有四指越盡十地而至究竟位極處兩息餘末二節一減一長皆盡滿而即得圓滿報身則外相增一指共算足滿百有二十五指之句然而正傳中則總略之如前今亦從之髮攢高八指頂尖寶嚴二指面形似鳥卵具喜悅慈愛之容目長三指寬分一指如蓮華瓣取長四指兩脾樞外邊相去十九指天男相無髭如將足十六歲童相服飾同報身佛像而輕健以華鬘為絡腋焉附佛之受用身為淨居天主變化身作穢土人師菩薩之受生亦莫不托於色欲兩界天人二種若隨類變化之應身不與故論相者一面二臂為本元而祕密部所出多面廣臂諸異相或借外相示內義如怖畏明王相其九面為示大乘九部契經義等類或為調伏諸異怪故現非常相如囉叉鬼王因具十頭以自慢時觀音大士特變十一面喜怒并具之異相而折絀彼傲氣等類是也手足義亦然亦可以類推也時輪盛樂金剛使畏大悲觀音等多面廣臂之數分法諸家傳授互有所異然其義理不忒明其一則餘者可推度而易知也今單出一相以為總軌之元式如十一面千臂觀世音功德尼式番王式等有番漢數樣今擇一合本足證者述之身量同佛立像而臍密間添四指通身白色元正面縱分同佛面廣十指慈相其右廂面藍色左廂面紅色此二面縱分同正面而廣分只得其半外添鼻準高分一指畫像之謂也若胎偶則橫分只作八指凸且扁此三面謂之法身三面第二層正面竪橫同作八指色黃白悲相髮際三指兩眉微顰而無笑容其右面正黃色左面赤黃色此二旁面縱分同正面而廣只得其半外邊添鼻分六麥分胎偶則廣分六指此三面謂之增長三面第三層正面七指色赤白喜相具微笑容髮際同前而其右面緑色左面紫色此二面縱分同正面而廣分只得其半外添鼻分五麥胎偶則廣分作五指此謂之報身三面以上三層右三面皆作顰眉直視微怒相左三面皆喜悅相第四層單面大怒明王相竪橫平六指青色髮之崇分亦然髮稍旋凝如獅子鬃鬣頂上彌陀佛頭化身面相紅色或作金色頸一指面輪五指髮際指半肉髻一指寶髻半指每面分均分十二少分依常制之各指推捫比較以度定各面之眉目鼻口及準頭等直曲寬狹除彌陀面外餘十面皆俱三目本教經曰目數千又三十二正面之兩耳貼在旁面之腮上以上為畫像之準也胎偶則第二層三層正面之兩耳俱各向前移一分即前說元正面之廣分胎偶作十指同義知此一像則一切具多面像者可以依是推度矣其廣臂之布設法自心窩而上比至六指處胎偶則六指零半指處從正中橫量各一搩至兩腋竪繩即作點記上比肩頂三指下比腋肢三指再從兩邊之記號起向外各去正五十指之地畫圓圈作環記所作諸手雖伸亦不得出此環記之外手足雖多根同生於一樞其式約略似扇把橫軸所攔適手舉者餘手從上向下排適手垂者裏收者同餘手自下往上排此式以經為徵且天竺國齎來像軀多見如是今漢番同俗不管適手之舉垂但是餘手盡作由上向下者非是千手者法身八手報身四十手化身九百五十二手共計滿千手也即從前說環記起向裏次第各驀四指復畫五層圓圈於是從前說兩旁點記起向外至於內圈直拉絣線勻分六分除却身質所占之分兩邊各作三分合算六分第二層上兩邊各分作十二分第三層各分十四分第四層各分十六分第五層各分作十八分第六層即前說外邊總括環圓記也兩邊各分作二十分而以為底盤境框復次始作法身八臂二適手當心合掌兩掌不宜緊貼中作虛之餘右第二手持白水晶念珠左第二手執白蓮華右第三手執金輪第四手作施願印左第三手執弓箭第四手持軍持舊翻澡瓶因其用而名之也又有譯作胡瓶者對華言之也今合其名實而直翻之曰頂沃其納口在腹吐嘴在頂頸長嘴小除二適手餘六臂俱排開而畫像不出內圈之外胎偶亦依此推度之內圈六分即為此六也手頭須排均勻安置其持數珠蓮華之手則對兩肩外邊手頭向裏覆而以指捻持之執輪及弓箭手頭略舉之餘二手頭略垂之報身四十臂從上向下排右翼二十手挨著次第一擎執佛像釋迦佛之像二如意寶珠三日精珠四青優波羅華五錫杖六白色金剛杵七利劍八鐵鉤九白拂左翼二十手亦挨著次第一寶殿二寶篋三月精珠四紅蓮華五鉢盂六金剛鈴七傍牌八羂索九楊柳枝其左右第十兩手合拱前面作等融印對拱臍下四指處右仰左俯兩掌合而以兩巨指相把之復從右第十一手挨次排下十一賢瓶腹大而圓頸之長分有其腹竪向三分之二口向外捲十二寶山十三髑髏杖髑髏在杖上頭十四梵夾十五鉞鈇十六金剛鐵椎十七作施無畏印十八玉印十九長槍二十交杵復從左第十一手挨次排下十一寶鏡十二玉環十三右旋白螺身質右旋其衽則反回左轉按螺蟲骨身通是左旋而衽回右轉今番僧寺廟為樂器用者即是謂之凡螺亦謂逆轉螺不為貴傳云螺身輒轉生螺連轉五次者即變右旋螺謂之仙螺亦謂順運螺在處大有吉祥世間甚為罕有十四五彩疊雲十五蓮華心蘂十六鐵金剛橛十七禾穗十八蒲萄十九鋼叉二十黃蓮華此四十手不出內頭一層圈外兩翼各二十手根同一樞歷歷均勻展如扇把其像如千臂俱全者此二十手俱由上至下只排一行若不作化身諸手則起第十一手復始排作一行而後層諸手次第安排互現前層諸手隙間次作化身手九百五十二臂照前所畫第二圈兩邊直繩各有十二分每分分作六分除兩邊極下各一分不用外其餘每分作一手共得百有四十二手復次第三圈兩邊直繩各有十四分每分分作六分除兩邊極下各一分不用外其餘每分作一手共得百有六十六手復次第四圈兩邊各有十六分如前分除之共得一百九十手又次第五圈兩邊各有十八分同前分除共得二百一十四手復次第六圈兩邊各二十分如前每分分作六分而每分各作一手則共得二百有四十手合前諸手是得滿千手也此九百五十二手悉作施願印手掌側仰之而少垂掌中眼目參差互見一一分明千手掌中皆有一目諸臂相皆極柔順圓好如正開之蓮華各不侵礙數雖千名而觀者自不覺其多矣法身八手形如常制報身四十手微細於法身諸手長分相同其寬奘分則此四十手比前八手奘二十分之去一分以是遞推凡後層列手奘分俱照前層諸手二十分之除去一分只作十九分便得矣胎偶者其四十八手但可收之無礙者向前隨宜收之則後層諸手得䯳爽矣故或舉或垂或伸或屈左右對偶意自相應蓋亦觀其執物之勢隨宜布置不必盡以邊圈為度惟從前往背面層層次第離空皆令均勻則不礙於背光單作法身八手者甚多四十八手者已屬罕見滿作千手者更少矣蓋因不得其法難作之故耳本經雖有持明人依像修習時不要務必待千臂全修之語然而解義云謂其千手乃為賢劫千位輪王千眼即賢劫千佛焉則面臂全具之功德自然大也凡一切廣臂相俱以此為元式其有多足者則自兩元足外邊起兩股根樞畫餘足邊際漸廣之以至於足指尖其足趺與諸指但得分明現見即是八件寶飾及衣服等俱同報身佛像三層面寶冠下層者不宜遮過上面嘴脣以上而以仁獸皮為絡腋舊作黑鹿皮未詳其義按仁獸梵云吉哩二合斯那二合薩𪢘華翻黑脊蓋因其毛皮而稱之耳常見西番國歲貢物件有此獸皮形似山羊而小毛短薄色多微黃脊毛純黑色天性最慈為人忘己據使者言捕時不事獵圍惟二人執兵尋其棲處既望見詐為相鬪狀喊聲對罵且作揮兵相擊勢此獸見之以為相害遂欲解救奔至隔立二人之間至死不去遂得而刺焉本朝官譯名謂之仁獸其披法則毛向外頭前尾後斜披左肩上以頭皮遮著左乳而將右邊後腿皮從像之背後由右腋下挽過至像之前與右前腿皮互相交盤縛之此一件服飾諸經典未見他像所用惟獨觀音及慈氏菩薩像有之兩足平立兩胯外邊相去廣量作二十四指二九搩度佛之畫像及菩薩像量度謂之十搩度此九搩度者自初地菩薩以下總攝二種聖像之常制也世間聖及出世聖縱廣相等各九搩每搩十二指合滿百有八指其分法則面輪自喉至心窩由是至肚臍至陰藏各一搩股與腨各二搩共為八搩九十六指髮際頸喉各三指共六指膝蓋足趺各三指共六指合十二指為一搩通計九搩此乃縱分之九搩百八指也廣分起心間平至兩腋左右各十指兩手臑各十八指共五十六指兩臂各十四指共二十八指手頭各十二指共二十四指合共得百有八指斯即廣分之度而以搩分得九搩也以右制為格局而諸賢聖又各稍有差別謹列於左獨覺像如十二辟支佛等頭頂上微現肉髻面目作於佛同體肢之闊量周度皆推模取準於前篇後皆放此羅漢像十八大聖徒十六阿羅漢等頂無肉髻相貌或老或少或善或惡以及豐孤俊醜雅俗怪異胖瘦高矮動靜喜怒諸形色赤黃白黑俱可目正鼻端最忌根肢缺傷然亦隨其耦對參差得宜為妙此與前獨覺像并著僧衣者也佛母像五行之真性為五部佛母亦謂明妃或有佛菩薩被大慈力以就世間之通情衆生通情惟母恩重且周特化女相者或善信女人女神發弘誓行大乘願滿成道者俱通稱佛母經傳雖有天女仙女之呼然皆隨其當時所現之裝有大小分之宜其為像之尺寸則更無有分別豫曾見一種尺寸書有百二十五指及百二十指等之分猝見似乎有理深詳之間有謬乖之論且不得其梵本未知何人集纂難以考信故闕之其像作十六歲童女相乳瓶廣八指周三倍胎偶則凸高分四指堅實不傾精氣足而不搖之相因無欲故也乳尖珠高闊各一指雙瓶中間橫二指髮作半攢崇六指向後傾之餘髮下垂而梢過手肘面形如芝麻或作卵形目縱三指廣半指似優波羅華瓣形臂梢脛梢指尖腰之極細處俱比他像稍細而肩頂亦作低二指下身之廣闊分比本制諸像稍加寬厚衣服莊嚴同菩薩像而總用正大窈窕之相方可三八搩度戒教王經云一切威怒像通作八搩度謂忿怒明王及惡相護法神乃以慈力為降服世間純陰毒種特變猛烈之相者也上品謂之明王如十大明王列於衆者即為護法如大黑神等內中雖亦少有分別然格局則同作八搩豎橫平等九十六指也其分法面輪頸至心至臍至陰藏各滿一搩共四搩股脛各十八指合三十六指共為三搩髮際膝蓋足趺各四指合為一搩通計八搩是為縱分指分得九十六廣分從心間至兩腋左右各十指兩手臑各十四指兩臂及兩手頭各十二指合共得九十六指斯即廣分之度而以搩分得八搩也底座高一搩蓮華十指日輪二指日月層疊者各得一滿指若有生靈則其臥身區分作八指而日輪作一指華作三指隨宜加減而俱不出一搩也蹲立而足尖向外右踡左展亦有反此者二踵直對間空三搩有齊踡蹲踞者惟留四指須得蓄威蘊怒山臨嶽發之勢方妙奪怒相具九勢身語意三門各具其三仙仙軒舉狀仡仡莊勇貌桓桓威武貌身之三也大笑叱吒可畏語之三也慈悲浩然寂然心之三也面形男方女圓三目大睜紅且圓顰蹙兩眉頭髮竪立高一搩上安頂嚴部主佛高四指髮眉髭鬍皆赤黃色熾然作火焰之狀張口呲牙而卷舌五髑髏為冠冠高六指橫四指髑髏身高亦四指其上寶嚴二指也瓔珞莊嚴天衣同菩薩像而虎皮為裙蛇為絡腋間有宜乎別扮者亦看其神之等差耳背靠作烈火焰此格內亦有二種一微露和悅容明王多用斯相目長二指寬指半上下牙齒間空亦指半通身不露骨筋脈絡腹垂遮股節約三分之二謂之夜剎怒相二甚怒大惡相護法多用斯相眼目縱廣平等二指上下牙齒相去亦二指鼻孔反豁手足筋悉皆暴露指甲尖似虎爪謂之羅剎怒相別有無上教經所載中圍輪王佛像時輪喜金剛上樂明王等亦可為奮怒相屬謂之仙人怒相然而中土自來未經流傳故不更述大略起於髮攢一切體肢量度悉同佛報身相而雙眉微顰三目長三指寬十麥分張口上下牙齒相去只得二麥分髑髏為冠而以五十新頭為絡腋鬘女相則隨髑髏為鬘象皮為衣有用人皮者骨鏤五印骨珠瓔珞以為莊嚴此間所說衣鬘以嚴乃無上教一切明王護法怒相之通用者也四護法像一切護法神總歸於男女二宗男宗以大黑神為首女宗以福女天為首亦名功德天女此乃據無上教而言也若依通教則屬於主守國土神一天下有八大守土神印土西番番僧諸剎莫不以斯二尊為先其造像之尺寸則既明於前章矣前說護法大怒相者即此類也二位並青色黑神右手執鉤刀左手摯顱器福女右手揮劍左手同上亦有黑神作官扮者其餘則西域約稱曰道八十八神八大天八大龍八大曜二十八宿四大天王九大怖畏十五鎮方天八大守土神東土通尊護法二十諸天其內雖有互見如世間三尊及帝釋已入八大天中復入鎮方神之類然亦因現各異不得認為重復也神通妙用分而百千合而為一統攝既殊因見自別未可執一而論也今取像傳所載數尊并遵中土風俗參考而述之以便於後世興福家云內中大底中土罕見者各位名下俱注其相其應入九搩格局者大梵天鎮上方神大自在天鎮東北方那囉延天亦算鎮方神青色微怒相顰目睜目而不張口也善扮右手擎執金輪左手觸胯執寶杖以上謂之世間三尊欲自在天即魔王天賢劫千佛之弟琢磨千兄速成道者紅色善相左手執弓右手執箭作武扮帝釋天主鎮東方神以上乃八天中五位也多聞天王持國天王辨才天女功得天女韋駝天童堅固地神菩提樹神鬼子母天摩利支天日宮天子月宮天女水天鎮西方神白色善相兩手持蛇索娑竭囉龍王風天鎮西北方神緑色善相手執風旗其應入八搩格局者增長天王廣目天王金剛密迹散脂大將火天鎮東南方神紅色善相頭髮連鬢鬍鬚俱赤黃具寶冠耳環手釧著縵衣右手持念珠左手持澡瓶閻摩囉王囉剎鬼王鎮西南方神青色惡相右手執利刀左手持賊人首級阿修囉王亦算鎮方神黑緑色武扮右手執利劍左手執圓盾持瞢財王鎮北方神黃色善相武扮而載寶冠右手執寶杖左手持財囊活鼠狼口吐珍寶者金翅鳥王人面鳥嘴牛角腰以上人身以下鳥體頭面青色脖頸至胸紅色而兩手合掌於胸前肚腹白色腰以下黃色翅尾緑藍交雜兩角間嚴以侔尼寶珠及具耳環項圈瓔珞臂釧雙翅展而欲舉之狀六搩制吉祥王菩薩即邪引天也乃八大天之一又算鎮方神數又為八大守土神之一白色善相象頭而左牙拆右手執鉞左手拏帶葉蘿蔔身量尺寸見於下以此三十六尊可為兼舉一切護法總要而八部鬼神無一不被總統也八部鬼神者一天二龍三夜剎四香陰五非天六大鵬七疑神八腹行復有言八部鬼衆者一香陰二噉精三甄卵四餓鬼五諸龍六臭鬼七夜剎八囉剎此乃世間鬼神之總略也六搩制者竪橫平等以六搩為度一名侏儒量即諸矮身像度也今惟録吉祥王菩薩一尊竪橫各六搩指分得七十二其分法則面輪一搩象鼻不在分內以下至心窩肚臍陰藏各十指而以搩分得二搩有半足之股脛各一搩膝蓋足踵各三指湊成半搩通計共為六搩指分七十二指此縱分之量度也廣分胸膛橫一搩兩手頭各一搩兩臂各十指兩臑各八指合成三搩通計亦是六搩七十二指而為廣分之量度也凡此格局分法諸家互有不同且多訛傳今細加校勘悉正其誤五威儀式兼載須知補遺威儀言手印幖幟坐住勢及一切莊嚴也東方金剛部主不動如來藍色手印於圖樣中釋迦佛手印同謂之降魔印幖幟則五股金剛杵竪置左掌上而大拇無名二指捻持之南方寶部主寶生如來黃色手印右手作於圖樣中救度母右手同謂之施願印左手如前正定印即如釋迦左手幖幟麻尼珠置左掌上西方蓮華部主彌陀如來紅色手印同圖樣中無量壽佛謂之禪定印亦謂等持印幖幟紅蓮華北方羯磨部主不空如來緑色手印左手如前正定右手胸前或乳傍手掌向外略揚之謂之施無畏印幖幟五色交杵捻執左掌上五色交杵上五峰紅下五峯白左五峯緑右五峯黃中心藍色中央如來部主毗嚧如來白色手印二拳收胸前左拳入右拳內把之而二巨指並竪二食指尖相依謂之最上菩提印具幖幟者則二手等持如無量壽佛去其寶瓶而安金輪是也此五佛頂嚴各作五股金剛以具五部之義或作麻尼珠頂嚴亦得須知不可執泥以上五印略為諸佛手印之總綱如造多佛像而不知其手印者內分五數為一𤳖通用此五印是古來傳授若有餘零則以下說別印補之其有以左手作拳巨指尖平入右拳內握之起立當心謂之毗盧大智印不空佛施無畏印如前而大拇無名二指相捻大藏祕要誤作大小二指餘三指竪如幡相乳傍手頭向外覆之謂拔濟衆生印又釋迦佛大乘法輪印同圖樣中文殊菩薩手印除去兩邊之華今釋迦佛以此手印造者人多誤識為彌勒佛因其手印相同故也又右手胸前揚掌而巨食二指相捻作畫策指示之狀謂之說法印右手作施無畏同前而左拳執袈裟角傾垂作如鹿耳於當心謂之授記印又期剋印者一名禁伏印怒相多用中指無名指並屈以巨指掩之食指微竪小指作鉤此等甚多詳載大藏密要維揚福國寺僧元度所集等經傳化身像多用空手印報身多用兼幖幟然亦不可執泥凡作一切印手指俱須柔順一一相隨如新開華瓣不宜作硬拙礙眼八大適子者一大智文殊菩薩杏黃色幟梵夾收卷亦可二大慈彌勒菩薩色同上軍持三大悲觀音菩薩白色蓮華四大行普賢菩薩紅色或淺藍色或白色如意寶五大勢密主菩薩緑色金剛杵六大力空藏菩薩藍色劍七大願地藏菩薩黃色鮮果八大勇除障菩薩白色寶瓶右為多見錯誤故因取通用一式類載於此若欲用雙幟則便取於他典可也即文殊加寶劍彌勒加龍華樹枝之類十二辟支佛者一消煩二明積三無畏四勇調五利慧六山勝七大聲八鱗角九除毒十示神十一獅子吼十二速意出普明成就儀緣覺像頭頂上肉髻微現者為其不數正量之說也正作連髮三指而周其三倍微偏近枕骨禪宗語録第八祖佛陀難提頂有肉髻者蓋是此類也十八聖徒者一上行第一聖摩訶迦葉二多聞第一聖阿難陀三智慧第一聖舍利弗四解空第一聖須菩提五說法第一聖富樓那六神通第一聖目犍連七論議第一聖迦旃延八天眼第一聖阿那律九持戒第一聖優波離十密行第一聖囉睺羅以上稱十大弟子十一化俗第一聖優陀夷十二火定第一聖索伽怛十三苦觀第一聖婆的性呵十四樂靜第一聖憍梵鉢提十五謹慎第一聖佛弟難陀十六獅子吼第一聖阿說示十七正辨第一聖婆摩羅夫十八初度第一聖阿若憍陳如是十八聖徒皆數聲聞出毗尼十萬品今時知者極希故特拈出以示後人其列位次第舍利目連二尊手執振錫鉢盂站世尊兩傍西域來式也以次十六尊兩邊列坐而以陳如迦葉二尊為左右領首普明就儀言緣覺聲聞印幟莫定振錫鉢盂等看其隨宜云云則用等持施願施無畏說法合掌等印及執持振錫鉢盂梵夾念珠澡瓶清拂蠅塵如意拄杖等俱可也十六羅漢詳法住記與三藏教乘二法數按西番十六羅漢像俱有手印幖幟並載公案然總未得其梵本故未敢録聲聞羅漢雖居九搩之度眼目長分只作二指而寬分隨其面相之所宜人間轉輪王身量亦是縱廣平等九搩目分同上長二指寬一指類乎帝釋等天像而其分別惟可使具髻鬚或作得老容若作天男相則不可也因人王有老有衰而天神止死不改童容故也出阿思陀二合仙子像傳庶人身體竪裏向三搩半以指分八十四指橫量四搩九十六指或反此者所以謂之縱廣不等不具量度之相也出無垢光論蓋言其大概耳今時竟有以為緣覺聲聞像法應隨庶人身量之說者何其謬之甚哉夫世間福德報獲輪王之身尚且得九搩度及具三十二相經云諸相雖具不如佛相之顯明焉何況三生修具漏盡脫塵以證聖果者乎是知當從前說九搩度以為準制矣遵黃祖庭斗率山寺祖傳準量法也佛相坐式所云金剛跏趺者即圖樣內釋迦之坐相是也左股上置右足而左足入於右股下謂之菩薩跏趺兩足少展而足脛左上右下相交於二膝下者謂之蓮華跏趺如圖樣內救度佛母坐法謂之右舒相反者左舒左踡而右膝直立其邊謂之勇猛跏趺坐高座而兩足下伸者謂之善跏趺餘見明王像章凡言善相者其相貌莊嚴俱同菩薩相言惡相者同明王相官扮者著大領寬袂袍寶帶朝靴善相寶冠忿怒相則用髑髏冠武扮者身著鎧甲寶帶朝靴頭或盔或冠看隨其宜也大黑神像或用六搩度者有之然今不從髮攢雖云菩薩作整攢佛母作半攢然嘗見西域諸像佛母有作整攢者菩薩亦有作半攢者一切諸像用純金色亦佳佛法未入中土之前已有諸方神像如竉神龍王等類相貌莊嚴自仍舊制亦得曾見西天佛子第五代傳引五隅總持經曰凡為鬼神貴乎方俗云云右所列格局制度皆悉從經傳考校詳定興福之家但以欽遵莫違則理義不忒而功德具勝若夫神佛菩薩具大慈悲善巧方便隨類應化就緣收生是其微機妙用不可思議豈得以是為等量哉六妄造誡若不具尺寸之過惡如何則出戒大教王經曰口面一自人中根至頦尖為口面頸二及腨三俱長為極惡言三處皆過量分也主人失本業被遣外流落腮邊一胸膺二脅三齊塌愈甚忌言三處皆不盈滿也常遇破敗難所為不適意額顱一鼻二乳瓶三並歪是大過奉者不長久爭訟被令墮脊旁一胯二股肉三皆平不盈報或損壽命限恆逢盜賊惱頂蓋一背光二座三咸小狹窄愆恩人多負義福衰壽不堅以上乃三會成咎所謂極惡也若犯其一二雖不為極惡亦是大過眼耳鼻嘴唇額頦腮等處不明或不正定遭種種辜反目急喘狀猶如驚動勢飄蕩離故鄉所作常不利手印幖幟錯憂愁相纏綿別有宜戒者一一叵盡言智者須謹慎因果不爽故相勉莫莽鹵欽遵準量度𩒰恆辣二合子仙所作像傳曰造像慎忌三病俱湊之過眼一鼻二手指三俱短或口面一脖頸二足腨三皆長或額顱一耳葉二胸膛三俱狹窄也一本胸膛作鼻子犯則必出不測之大禍而永不寧竪橫不等者主田蠶被災身體肢根中有歪斜則子弟多出僂攣躄缺之殘疾鼻塌出謬愎一切相中眼目最為要股根瘦者𭑩胎多廢半途圓處不圓滿處不滿者果穀屢不收其餘小處不合尺寸則失物破財像有拆斷則嗣族衰敗裂文應起盜賊又阿思陀二合仙子像傳云量度不準像正神不受寓反別邪魔鬼為所依而住駁善助不祥任意縱其欲云云所以是等之形像宜重修理或改造先作阿哩伽二合儀軌徙靈光乃擇日而塑像所有舊像木偶者淨綿或淨布纏繞以淨香油合密漬之以火然化而沈其灰於清淵石泥等胎者曠野淨處掘地仞許深窖而謹藏之若係金銀銅鐵等像則可鎔化仍復合用於新像胚質主掌是事者乃已獲仙位之人方可若凡夫為之則恐不利於本身也上一則亦出𩒰怛辣二合子仙像傳所言已獲仙位之人者謂實受灌頂而究竟修練呪數圓滿者乃指持明士人也中土少有或番僧中得之若必用中土僧人亦須道高德重民贍神欽之士若凡夫不能感動鬼神所以或恐招禍也右論特為佛菩薩之像而他像次之其所說罪辜之事則明知故犯為極惡不知而犯者亦以為大過其於過惡相反即是吉利譬如豎橫平等田蠶多收之類當其善惡果報者像前事奉持明人為上首而功德主與工人次之以及鄰里鄉黨俱有霑蒙也近時有工家稱梵式宗乃其所為佛像輒作長頸縮腮狹胸寬目所為羅漢像眼目與佛相同處頗多蓋流源疏闊失迷口傳之故耳七徙靈略阿哩伽二合儀軌者即徙靈光之法也凡重葺之舉先不作此法而冒昧妄動者即犯毀像廢塔之罪若當時幸遇持明士準阿哩伽儀軌徙靈光則彼自有廣略作法若用別僧則先備改修之一切應用物件至於巧工等齊畢然後擇日而期辰前一日按其各宗則例作銷災吉祥道場奉齊本宇佛祖天神至於土地諸祠及濟一切貧乏皆被豐足禱祝之際專發至誠虔心健立志量且思且誦曰我等誠心通明力如來威神加持力法界清淨叵思力以此真正大勢力諸願為善功德事無礙自成盡如意畢壇主拈香掌罄者鳴罄三拜起衆胡跪合掌壇主高聲祝云某甲率領衆等實發道心至誠仰啓覺聰俯垂鑒證今特為重葺聖像因具足福德瑞祥以寶壇勝境鞏固而供用資糧增長廣攝遐邇不偏普脫苦惱患難教化熾盛無邊際衆生歡樂永平安所以敢舉改容事竭盡施主某等力恭奉如來遺留敕欽遵古德通畫一明日穀旦徙靈光慈悲準允錫利益作樂觀作欣然即許之想遂唪誦別讚頌等照平素常例令竟之次日即正日也齊濟道場同昨日而唱諦力畢即我等誠心云云六句也用一明亮鏡壇主拱執像前向像影對照祝辭同前而其中明日穀旦四字改作今日此時四字讀之作樂時壇主念惹引吽引婆母二合和引且誦且觀作彼在像之智慧靈忽然離像猶若鳳雛之解卵㲉即如流星孛入於鏡中之想復以紅色淨袱蒙裹時一人亦拏一淨袱齊蒙像面且誦安住呪唵蘇巴啦二合底思茶二合跋闍囉二合耶婆引訶引從此彼鏡不側不倒上下不錯正置於淨處以後凡禮拜供養事輒作鏡前而不可作於殘像前至新像既成而作安住之時刻其鏡蒙袱總不得啓開本録云作徙靈之緣為敗像重新及改修質相不佳之像而其經過慶讚者質本體也質不佳言材料不好相不佳不合尺寸也或為舊地有所不便之處因擇地遷移之類必叵不動故是也其正作之時則人心合同而財用備齊之期也據此則除他故外但疑其相之不佳若不犯三病會成過格且未露不祥之形跡而資用力劣則未可輕動不過課誦大乘經典𮘗持神明真言以厭彼未萌之咎及滅其人心之疑或將大寶樓閣總持書寫於牆壁亦能鎮災致福八裝藏略安像總持附顯密兩教俱有裝藏之說而悉言用舍利中具二種或曰四種法身舍利作第一生身舍利次之故西土風俗多用法身舍利即五部大陀囉尼以為上首一切經呪文辭是也五大陀囉尼者一佛頂尊勝呪此呪世人多知之二佛頂放無垢光明呪在大藏忠字函三正法祕密篋印呪同上四菩提場莊嚴呪不字函五十二因緣呪也此亦知者多一名因緣法頌而維字函造塔功德經等出處不一有譯漢者有以漢文音之而未譯語者內有雜用安種字一文處乃是五部元主如來與六大菩薩之根本明靈種字也頂上肉髻內項喉內心間衷臍孔內密處額上以上有𭘭木則順書𭘭木前面無𭘭木則書於紙而安中畿分藏各正位處畫像則就梵絣居中書之又二目上二字兩耳上兩字鼻上中間舌根當口此五根種字與齊問字滿六根皆書於草創之素底各處以被彩粉塗蓋其㡧像之藏亦應作如是若已成者則書於背面亦可藏有五方之分其中畿之藏則頂上種字下安楞嚴總持項喉種字下或傍安音聲字母心間種字下或傍安一切智呪臍間二種字上下及其周圍安金剛壽命心呪密藏種字下安鞏固善住呪其四方之藏則前面佛頂尊勝右邊無垢光明後面祕密篋印左邊菩提場莊嚴此四呪之尾續及中畿之下俱安十二因緣總持其下正中墊財神天地輪座內安護法善神之真言及一切吉祥頌偈若護法像之座位內則惟用吉祥偈是等呪語或用全部總持或用小總持或惟心呪或用心中心或本尊心呪至於種字一文堅固子一粒為止呪數亦不拘多少只度其腔量之寬狹而為之若甚小之像及衷實者不用藏亦得從印土來鉝麻像不宜補添藏鉝麻番語即白銅也或曰響銅西域有此銅山昔迦葉佛親遊斯山加持而授記之曰當來迦牟尼佛出世時彼教下人採茲銅作像禮拜供養者獲無量功德云云其試法近處夰置箇真堅固子則即吸取焉或觸之則輒粘蓋同氣相感故耳夰音泉放也按天地輪有兩種一前藏達賴剌麻宗派例字頭向內即此式是也合用天輪在上而地輪在下乃尊卑通道之理也一後藏班臣佛宗派例字頭向外而合用地輪在上天輪在下蓋合地天泰卦之義也兩樣俱可用因其機在字頭之向方故云以上通用之制度如胎偶之腔量甚廣則附用大寶廣博樓閣善住祕密總持息字函等一切吉祥真言竭力安之更佳藏中所用真言或梵字或漢文皆宜橫書盡容於一行內其餘行另書他呪或本呪前行周而復始惟不可一首總持半途間斷折回來往復書書字和用椒汁則被蟲不食云或欲此外附安經卷整夾亦得大乘經律論安在心間以上小乘經律論則安心間以下俱額向上竪置之或有堅固子併裝則與鬱金華同包束置小淨盒內連盒隨宜處安置即所謂生身舍利者也乃戒定慧之所熏修甚不易得其色有三骨舍利色白髮舍利色黑肉舍利色赤獲聖果者皆有惟佛舍利槌擊不破弟子舍利固分不及又通稱靈骨或曰內分有二一謂行道舍利或翔空或發光一謂入定舍利閉其靈形不可得見又骸骨與尸炭謂身種舍髮爪及衣服拂珠等被氣所熏之物件謂毛絮舍利然斯二種聖凡通具惟本人之像中可用若論通用之說則傳所云凡夫身體所出者不得用建立相反者不得用穢污者不得用其真聖實仙之身體所出者不輕易得且難識別其是否故惟用法身舍利為便而佳也今録全藏之要略以為後人擬推之式其用梵字因其源從梵天處所流傳人間且佛敕原文具大攝受凡見者聞者念者觸者書寫讀誦佩帶禮拜供養右繞者咸獲利益番漢傳集同作如此稱讚故也不熟梵者以番字及漢文書之梵番左始漢文右起慎勿脫落錯誤點竄一切西番藏呪皆用板印者圖其甚便也不論其文或自尾向上或從頭往下緊捲之以淨糊封口不得用皮角膠等物形如爆竹記其上下不可顛倒倒則犯火災出將達大師傳捲畢以黃絹裹之始終要潔淨持八闕齊為妙書藏及裝藏日或當時忌葷酒禁氣惱等一切不祥之事發喜悅良善心口誦十二因緣呪或梵或漢不能者默持他呪或念佛名號譯漢因緣呪曰見五異譯中取義淨法師譯諸法從緣起如來說是因彼法因緣盡是大沙門說按此頌大小二乘顯密教俱有之全包三藏深義凡作善事持誦此偈則獲無量功德於是用五寶金銀珍珠珊瑚青金石五甘露蜂蜜石蜜乳酪酥油五藥菖蒲仙人掌一種草根苦參烏賊藤梨𭗠五穀稻大麥小麥緑豆白芝麻五香白檀沈香肉豆寇龍腦香鬱金香即香紅華也細末合一處復晒乾之以少分塗於天地二輪間多分再加諸般香麵以窒一切空枵為其不散不朽不生蟲蛀堅固之本也按𭘭木乃塔幢所必須於像則非必用之物然像之甚大者用之更妙其法如係現採則先擇珍産栴檀沈速檜柏等無毒無刺而疆健者若係購買亦須重價易之或以禮善求不可強索盜取既得之則記其本末而陰乾之作時本末不可顛倒本往下末向上為正長分勘新像之量亦作百二十五指為度言如來之像也若他像亦以此推度臍際分以上作圓而稍細以下作方尖不宜太鋭但得似塔之形乃妙下根作五股半杵形畫作亦可以朱粉塗之所書之字金為上彩粉為中墨為下他處亦如是差別頂之一指入於寶髻內項際下即安手主心木形圓臍際下八指處安足主心木形方足之主心木以下梵𭘭餘四指為密藏處則內分之百二十五指自不差矣附經云聖像已成即為人天共仰無上福田矣而復用安住即安像法者加被慧尊冥熏之力神靈功德俱倍恆常焉其法同前徙靈章中演說遇大持明仙士則彼自然能遵如來安像三昧經在大藏止字函或廣或略隨宜而為不待言外叵不塞責之作則上齊下施普濟同悅吉祥道場效前徙靈章作而若其創造之像則初祝之辭中重葺二字改念創造二字敢舉改容事五字改念今瑞像已成五字徙靈光三字改念安住像三字次日即照徙靈正日之法作而其重葺像則作樂時壇主親捧先所收靈之鏡去其蒙帳對像照之謹誦惹引吽引婆母二合和引而觀作其智慧靈光從鏡中瞥然出而入潤於像身之想誦唵蘇巴啦云云呪亦同若創造之像則作樂時壇主默觀作自清淨法界被本尊為首一切聖會招住凝融入於像身之想且誦安住像呪曰即安像總持唵薩哩二合瓦怛他引伽怛麻儞沙怛第巴嘚入嚩二合剌入嚩二剌達哩二合麻達覩𭈚哩二合鞞娑引賀引且誦且撒華米於像上鮮華或稻米遂念招住凝融四字真言即惹引吽引婆母二合和引四字也念誦畢開光真言曰唵拶克二合芻拶克二合芻薩滿怛拶克二合芻尾刷達尼娑引賀引請永住呪唵蘇巴啦二合底思二合茶跋闍囉二合耶娑引賀引觀作永住本像寶胎以慈遍臨衆生保護攝受之想遂唪誦別讚頌等照著平素常例而令竟之當日會中佛工為上客而必厚資謝之傳云凡像神靈喜住有二因一具足量度二工師歡悅其不宜慎之乎此方嘗見裝藏捶銀造心肝等五藏六府及竭力所獲財寶珍物者其念非不佳也然無所憑據且常招小人令彼獲無間之罪彼此兩生畏悔之心依愚不用為妙及開光不作佛事而用烏雞等物蓋非出內典者宜永禁之可矣右二條乃章佳國師語録中節取者也九造像福二乘大小兩教顯密演示造像功德甚多今惟就造像本經中節取兩則亦足以勸發淨信善心矣唐于闐三藏法師提雲般若等奉制譯出大乘造像功德經云佛言天主諸有曾經作佛像者皆於過去已得解脫在天衆中尚復無有況於餘處唯有北方毗沙門子那履沙娑曾於往昔造菩薩像以斯福故後得為王名頻婆娑羅復因見我今得生天有大勢力永離惡道優樓頻螺迦葉伽耶迦葉那提迦葉並曾於往世修故佛堂由此因緣永得解脫憍梵波提昔作牛身追求水草右繞精舍食諸草竹因見尊容發歡喜心乘茲福故今得解脫尸毗羅曾持寶蓋供養佛像阿㝹樓馱然一支燈亦以供養輸鞞那曾掃佛堂阿婆麼那於佛像前然燈施明難陀比丘愛重尊儀香水洗沐有如是等無量諸阿羅漢皆悉曾於佛像之所薄申供養乃至極下如那伽波羅於像座前以少許黃丹畫一像身而為供養由此福故皆永離苦而得解脫天主若復有人能於我法未滅盡來造佛像者於彌勒初會皆得解脫若有衆生非但為已而求出離乃為欲得無上菩提造佛像者當知此則為三十二相之因能令其人速致成佛又答彌勒菩薩言彌勒諦聽諦聽善思念之當為汝說若有淨信善男子善女人於佛功德專精繫念常觀如來威德自在具足十力四無所畏十八不共法大慈大悲一切智智三十二種大人之相八十隨形好一一毛孔皆有無量異色光明百千億種殊勝福德莊嚴成就無量智慧明了通達無量三昧無量法忍無量陀羅尼無量神通如是等一切功德皆無有量離衆過失無與等者此人如是諦念思惟深生信樂依諸相好而作佛像功德廣大無量無邊不可稱數彌勒若有人以衆雜綵而為繢飾或復鎔鑄金銀銅鐵鉛錫等物或有雕刻栴檀香等或復雜以真珠螺貝錦繡織成丹土白灰若泥若木如是等物隨其力分而作佛像乃至極小如一指大能令見者知是尊容其人福報我今當說彌勒如是之人於生死中雖復流轉終不生在貧窮之家亦不生於邊小國土下劣種姓孤獨之家又亦不生迷戾車等商估販貨屠膾等家乃至不生卑賤技巧不淨種族外道苦行邪見等家除因願力並不生彼是人常生轉輪聖王有大勢力種姓之家或生淨行婆羅門富貴自在無過失家所生之處常遇諸佛承事供養或得為王能持正法以法教化不行非道或作轉輪聖王七寶成就千子具足騰空而行化四天下盡其壽命自在豐樂或作帝釋夜摩天王兜率天王化樂天王他化自在天王人天快樂靡不皆受如是福報相續不絶所生之處常作丈夫不受女身亦復不受黃門三形卑賤之身所受之身無諸醜惡目不盲眇耳不聾瞶鼻不曲戾口不喎斜脣不下垂亦不𩓀澀齒不疏缺不黑不黃舌不短急項無瘤癭形不傴僂色不斑駮臂不短促足不𤼣跛不甚瘦不甚肥亦不太長亦不太短如是一切不可喜相悉皆無有其身端正面貌圓滿髮紺青色軟澤光淨脣如丹果目若青蓮舌相廣長齒白齊密發言巧妙能令聞者無不喜悅臂肘𦟛長掌平坦厚腰脾充實胸臆廣大手足柔軟如兜羅綿諸相具足無所缺減如那羅延天有大筋力彌勒譬如有人墮圊廁中從彼得出刮除糞穢淨水洗沐以香塗身著新潔衣如是此人比在廁中猶未得出淨穢香臭相去幾何此事懸隔無有等倍彌勒若有人於生死中能發信心造佛形像比未造時相去懸隔亦復如是當知此人在在所生淨除業障種種技術無師自解雖生人趣得天六根若生天中超越衆天所生之處無諸疾苦無疥癩無癰疽不為鬼魅之所染著無有癲狂乾痟等病癘瘧癥瘕惡瘡隱疾吐痢無度飲食不消舉體痠疼半身痿躄如是等病四百四種皆悉無有亦復不為毒藥兵杖虎狼師子水火怨賊如是橫緣之所傷害常得無畏不犯諸罪彌勒若有衆生宿造惡業當受種種諸苦惱事所謂枷鎖杻械打罵燒炙剝皮拔髮反繫高懸乃至或被分解支節若發信心造佛形像如是苦報皆悉不受若寇賊侵擾城邑破壞惡星變怪饑饉疾疫如是之處不生其中若言生者斯則妄說爾時彌勒菩薩摩訶薩復白佛言世尊如來常說善不善業皆不失壞若有衆生作諸重罪當生卑賤種姓之家貧窮疾苦壽命夭促後發信心造佛形像此衆罪報為更當受為不受耶佛告彌勒菩薩言彌勒汝今諦聽當為汝說若彼衆生作諸罪已發心造像求哀懺悔決定自新誓不重犯先時所作皆得銷滅我今為汝廣明此事彌勒譬若有人宿行慳吝以是緣故受貧窮苦無諸財寶資用匱乏忽遇比丘先入滅定從定初起即以飲食恭敬奉施此人施已永捨貧窮凡有所須悉如其意彌勒彼貧窮人先世惡業及所得報今何在耶彌勒菩薩言世尊由施食故先世惡業皆悉滅盡永離貧窮大富充足佛言彌勒如汝所言當知此人亦復如是由造像故彼諸惡業永盡無餘所應受報皆不復受彌勒業有三種一者現受二者生受三者後受此三種業中一一皆有定與不定若人信心造佛形像唯現定業少分容受餘皆不受爾時彌勒菩薩摩訶薩復白佛言世尊如來常說有五種業最為深重決定墮於無間地獄所謂殺父害母殺阿羅漢以惡逆心出佛身血破和合僧若有衆生先作此罪後於佛所生淨信心造佛形像此人為更墮於地獄為不墮耶佛告彌勒菩薩言彌勒我今為汝重說譬喻如或有人手執強弓於樹林中向上射葉其箭徹往曾無所礙若有衆生犯斯逆罪後作佛像誠心懺悔得無根信我想微薄雖墮地獄還即出離如箭不停此亦如是又如比丘得神足通從海此岸到於彼岸周旋四州無能礙者此人亦爾由先所犯暫墮地獄非彼宿業所能為礙爾時彌勒菩薩摩訶薩復白佛言世尊諸佛如來是法性身非色相身若以色相為佛身者難陀比丘與轉輪聖王皆應是佛以悉具有諸相好故或有衆生壞佛法身法說非法非法說法後發信心而造佛像此之重罪為亦銷滅為不得滅佛告彌勒菩薩言彌勒若彼衆生法說非法非法說法唯以口言而不壞見後生信樂造佛形像此先惡業但於現身而受輕報不墮惡道然於生死未即解脫爾時彌勒菩薩摩訶薩復白佛言世尊若有人盜佛塔物盜僧祇物四方僧物現前僧物自用與人如已物想世尊常說用佛塔物及僧物者其罪甚重然彼衆生作是罪已深自悔責起淨信心而造佛像如是等罪為滅不耶佛告彌勒菩薩言彌勒若彼衆生曾用此物後自省察深懷愧悔依數酬倍誓更不犯我今為汝說一譬喻如有貧人先多負債忽遇伏藏得無量寶還其債已長有餘財當知此人亦復如是酬倍彼物又造佛像免諸苦患永得安樂爾時彌勒菩薩摩訶薩復白佛言世尊如佛所說於佛法中犯波羅夷不名為生或復有人作斯罪已發心憶念諸佛功德而造佛像於佛法中得再生不又於今生第二第三第四生中獲證法不佛告彌勒菩薩言彌勒譬如有人生被五縛若得解脫如鳥出網至無礙處此人亦爾若發信心念佛功德而造佛像一切業障皆得消除於生死中速出無礙彌勒當知乘有三種所謂聲聞乘獨覺乘及以佛乘此人隨於何乘而起願樂即於此乘而得解脫若但為成佛不求餘報雖有重障而得速滅雖在生死而無苦難乃至當證無上菩提獲清淨土具諸相好所得壽命常無有盡爾時會中有未發大乘心者皆生疑念如來過去為造佛像為不作耶設若作者云何壽命而有限極有病有苦所居國土多諸穢濁不得清淨時波斯匿王承佛威神即從座起長跪合掌白佛言世尊我見如來諸根相好及以種族皆悉第一其心決定無有所疑然佛世尊曾於一時被佉陀羅木刺傷其足又於一時遇提婆達多推山迸石傷足出血昔復一時唱言有病命遣耆婆調下痢藥又一時中曾患背痛令摩訶迦葉誦七菩提分所苦得除復於一時曾有所患使阿難陀往婆羅門家乞求牛乳往復一時於婆羅村中三月安居唯食馬麥復曾一時乞食不得空鉢而還如世尊言若有人作佛像者所有業障皆得除滅離衆苦惱無諸疾病世尊往昔為曾作像為不曾作若於昔時作佛像者何因而有如是等事佛告波斯匿王言諦聽諦聽善思念之當為大王分別解說大王我於往世為求菩提以衆寶栴檀彩畫等事而作佛像過此會中人天之數以斯福故雖在生死未盡諸惑然所受身堅如金剛不可損壞大王我念過去於無量劫生死之中造佛形像爾時尚有貪瞋等無量煩惱而共相應然未曾於一念之間以罪業故有四大不調及惡鬼神諸少病苦所須之物莫不充備況我於今已得阿耨多羅三藐三菩提而有如是不如意事大王若我昔時曾作佛像今有殘業受斯報者我復云何作無畏說言造佛像決定能盡諸惡業耶大王我於過去給施無量飲食財寶云何今時乞求不得而食馬麥儻令此事而有實者云何我於無量經中種種讚歎檀波羅蜜說其福業終不虛也大王我是真實語者不誑語者我若欺誑況餘人乎大王我已久斷一切惡業能捨難捨能行難行所捨身命過百千億已造無量諸佛形像已悔無量諸罪惡業豈得有斯毀傷病苦食噉馬麥飢渴等事若曾得勝果今還退失何假勸修此衆福善大王諸佛如來常身法身為度衆生故現斯事非為實也傷足患背乞乳服藥乃至涅槃以其舍利分布起塔皆是如來方便善巧令諸衆生見如是相大王我於世間現如是衆患事者欲示衆生業報不失令生怖畏斷一切罪修諸善行然後了知常身法身壽命無限國土清淨大王諸佛如來無有虛妄純一大悲智慧善巧故能如是種種示現是時波斯匿王聞此說已歡喜踊躍與無量百千衆生皆發阿耨多羅三藐三菩提心爾時彌勒菩薩摩訶薩復白佛言世尊有諸女人志意狹小多懷嫉恚輕薄諂曲有恨不捨知恩不報設求菩提莫能堅守常欲誑惑一切衆生亦復為他之所誑惑世尊若此女人造佛形像如是諸業得除滅不當來得作勇健丈夫求佛果不得生知恩報恩人不得具智慧大慈悲不於生死法能厭離不除因願力得更不受女人之身如瞿曇彌及佛母摩耶夫人不佛告彌勒菩薩言彌勒若有女人能造佛像永不復受女人之身設受其身則為女寶尊勝第一然諸女人有五種德此女所得出過諸女何等為五一者生孕子息二者種族尊貴三者稟性貞良四者質相殊絶五者姿容美正彌勒一切女人有八種因緣恆受女身云何為八一者愛好女身二者貪著女欲三者口常讚美女人容質四者心不正真覆藏所作五者厭薄自夫六者念重他人七者知人有恩而己背逆八者邪僞莊飾欲他迷戀若能永斷如是八事而造佛像乃至成佛常作丈夫更受女身無有是處彌勒有四種因緣令諸男子受女人身何等為四一者以女人聲輕笑喚佛及諸菩薩一切聖人二者於淨持戒人以誹謗心說言犯戒三者好行諂媚誑惑於人四者見他勝已心生嫉妬若有丈夫行此四事命終之後必受女身復經無量諸惡道苦若深發信心悔先所作而造佛像則其罪皆滅必更不受女人之報彌勒有四種因緣令諸男子受黃門身何等為四一者殘害他形乃至畜生二者於持戒沙門瞋笑謗毀三者情多貪欲故心犯戒四者親犯戒人復勸他犯若有男子先行此事後起信心造佛形像乃至成佛不受斯報常作丈夫諸根具足彌勒有四種業能令丈夫受二形身一切人中最為其下何等為四一者於尊敬所而有蒸穢二者於男子身非處染著三者即於自己而行欲事四者衒賣女色而與他人若有衆生曾行此事深自咎責悔先所犯起淨信心造佛形像乃至成佛不受此身彌勒復有四緣令諸男子其心常生女人愛欲樂他於己行丈夫事何等為四一者或嫌或戲謗毀於人二者樂作女人衣服莊飾三者於親族女行淫穢事四者實無勝德妄受其禮以此因緣令諸丈夫起於如是別異煩惱若悔先犯更不造新心生信樂作佛形像其罪既滅此心亦息彌勒有五種慳能壞衆生何等為五一者慳惜所住鄰邑由此當於曠野中生二者慳惜所居宅宇當作蟲身恆居糞穢三者慳惜端正好色當感醜惡不如意形四者慳惜所有資財當受貧窮衣食乏少五者慳惜所知之法當有頑鈍畜生等報若悔已先業造佛尊儀則永離慳心無前所受彌勒復有五緣令諸衆生生邊夷之處及無佛法時何者為五一者於三寶良田不生淨信二者背實虧理妄行教誡三者不如理實而有教授四者破和合僧令成二部五者極少乃至破二比丘令不和合若永斷斯業造佛形像則常遇佛興恆聞法要彌勒衆生復有五種因緣常被於人之所厭逐乃至至親亦不喜見云何為五一者兩舌二者惡口三者多諍四者多瞋五者巧說相似之言以行誹謗後若發心造佛形像悔先惡業誓不重作其所作罪並得除滅為一切人之所愛敬何以故諸佛有無量無邊勝福德故無量無邊大智慧故無量無邊三昧解脫等種種希有功德法故善男子假使有人以三千大千國土抹為微塵復碎彼塵一一塵分等彼三千大千國土微塵之數有如是等碎微塵數三千大千國土設復有人取一碎塵以神通力往於東方一剎那頃過彼所碎微塵數三千大千國土第二第三後後剎那皆亦如是乃至終彼碎塵數劫彼諸劫中所有剎那一一剎那各為一劫經爾許劫剎那剎那皆度如前碎微塵數三千大千國土如是畢已乃下此塵是人還來更取一塵復往東方過前一倍下塵而返至第三塵倍於第二如是次第轉倍於前乃至盡此碎微塵數如說東方南西北方皆亦如是是人四方所經之處一切國土盡抹為塵此諸微塵一切衆生共校計籌量容可知數於如來身一毛孔分所有功德不可知也何以故諸佛如來所有功德無有限量不思議故善男子假使如前微塵等數舍利弗等所有智慧不及如來一念之智何以故如來於念念中常能出現過前塵數三昧解脫陀羅尼等種種無量勝功德故諸佛功德一切聲聞辟支佛於其名字亦不能知是故若有淨信之心造佛形像一切業障莫不除滅所獲功德無量無邊乃至當成阿耨多羅三藐三菩提永拔衆生一切苦惱云云是經惟示造如來佛像之勝功德其一切諸像皆依此次第而推度之或曰畫傳並未另載別像校量之說夫因現感應隨類變化像雖殊異然莫非如來之示現又何疑焉
