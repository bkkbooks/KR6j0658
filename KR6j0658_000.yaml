body:
  text: 造像量度經序烏朱穆秦部落原任公工布查布深通五明精習三倚心珠內含慧月外照憫夫世之造像者離宗失迷程式靡準三會成咎淪於極惡致使如來妙勝末由仰瞻乃追幀像之初宏演胎偶之法翻譯量度經一卷手加注釋積歲既成請正於余余惟在昔釋迦如來為須菩提説金剛般若波羅蜜經云若見諸相非相即見如來又云發阿耨多羅三藐三菩提心者於法不説斷滅相夫真空冥冥無我無人一切有為如夢幻泡尋茲元理蕩蕩難名斯則神明變化無可究其形容者矣然而因現相乘種種具足色身融相如虹斯彰遍諸大千普示覺利剎剎塵塵蚩蚩蠢蠢聞香觸光歡喜無量自漢以來至於今日范金鑄形摶土成像俾諸眯曚同著隻眼豈非法界之明燈果海之寶筏哉若乃宿根明淨智慧通流瞻奉慈雲大啓正覺循是有相以窺無相眼耳鼻舌如如空虛人我衆生等無障礙所謂以一莖草化丈六身者逼塞遍滿隨處湧現我佛全體於是乎在譬如得魚自然忘筌顧非是筌魚何緣得釋經功德亦復如是余樂其有善因也為之訂魚亥剃繁重更付剞劂流傳四大庶幾四八莊嚴隨分圓足八十妙好放大光明以是因緣齊生忉利云爾時乾隆十三年歲次戊辰秋七月中元吉日和碩莊親王愛月居士題并書造像量度經序一切諸經所謂佛之身也顯密衆典所載二身三身四身五身等許多分別演説者其説有二一曰法身二曰色身色猶相也其約在有相無相法身無相報身住淨土體同虹霓化身住穢土躬與人同俱有相法身者慧德之報修習自覺自利之功行圓滿之極地色身者福德之果能為覺他利他之方便大權成就之至處佛為救度衆生發菩提心屢劫勤行精進並修慧福二德無毫停息以當得甘露獲佛果謂之得甘露時至果報併結究竟正覺焉法身元體如同虛空無有著礙遍一切處不可分別清淨智慧色身融相雖類人天相好莊嚴奇特超絶世無可比因其一切諸善福德具足故言五部圓滿報身及百京最上化身也其隨類變化身則無有定矣雖分而言之謂二合之可以為不二衆生若得見其躬或聞其音觸其光至於心所憶念者具德無量饒益其善遠被慈愍未得親覩者乃有造像之術遺於世間作為方便第一福田凡得見聞想觸但有接緣者悉能消除身心之災障而令發二覺之心引入無漏之境利益不亞於原身也其術世稱為量度經傳流通聖方及諸番地自漢明帝初入於中華迄今千有六百餘年雖信心瞻禮頻示形容而工業倣效實未盡真迹妙之矣今有番學大人工某者生平樂學習之業懷弘濟之念寒暑不墆益久彌勤因見佛像傳塑規儀未盡乃特譯出舍利弗造像經親加注述弘緘具備而屬豫考訂豫細閲數次喜自不勝因規校一切詳加釐定題諸經首以記豫隨喜之志云耳乾隆七年佛初轉法輪日敕封灌頂普善廣慈大國師章佳胡圖克突書於敕建嵩祝禪林佛説造像量度經序或問佛有相耶答佛有相問佛無相耶答佛無相問佛有相之中無相耶答然問佛無相之中有相耶答然問如何是佛有相答衆生有相佛焉無相問佛相衆生相一耶二耶答不一不二問如何是不一答佛以沙劫薰修百千萬行相好莊嚴圓成果海衆生曠古無明性天未朗所行所感不出六道故不一也問如何是不二答佛言我昔曾為蟲來未成佛時何異衆生今衆生之中忽然大悟已有佛性於生死海中頓超覺岸前佛後佛而無間焉故無二也問如何是佛無相答佛未出世相從何生問出世後如何答鏡華水月問鏡華水月是無耶答爾問鏡華水月問畢竟如何答爾問畢竟問畢竟無問處答無問處亦無噓靈山拈華之旨少林分髓之機全彰無剩矣問如何是佛有相之中無相答有不自有因無而有無不自無因有而無衆生執有以成病諸佛以無為藥而治之經云三心不可得者是也衆生執無以成病諸佛以有為藥而治之經云於法不説斷滅相者是也然則有亦能成病有亦能為藥無亦能成病無亦能為藥有也無也藥也病也在當人執與不執而已矣經云佛説一切法為度一切心我無一切心何用一切法是也我則曰佛現莊嚴相為度六道生六道證真空莊嚴不可得經云即非諸佛是名諸佛即非莊嚴是名莊嚴即非衆生是名衆生是也問如何是佛無相之中有相答淨法界中本無色相大悲示現四八莊嚴莊嚴者非別所有莊嚴即衆生而莊嚴者也何也衆生執貪欲諸佛化貪欲而為解脫衆生臥無明諸佛破無明而為般若衆生輪生死諸佛超生死而為涅槃譬如木中本有火性當其未假方便因緣火何有也及其方便施工火從木出可説無耶衆生佛性亦復如是當其迷時無明雲暗智月未彰三界茫茫一大夢場及其悟也慧風大掃雲盡無方性天本潔智月本光本潔本光者不為無明雲暗而無不為無明雲盡而有也嗚呼三世諸佛即三世衆生三世衆生即三世諸佛不有衆生安有諸佛不有諸佛誰度衆生然則衆生者諸佛之苗也諸佛者衆生之果也當知衆生不可輕也輕衆生輕諸佛也諸佛不可不學也不學諸佛衆生不了也衆生要了者當觀諸佛之相好也諸佛之相有四八端嚴八十妙好者從百千三昧無量妙行而來也衆生可有此相耶可有此好耶既無此相又無此好者定無百千三昧無量妙行者也要求諸佛之相好端嚴當求諸佛之百千三昧無量妙行諸佛之百千三昧無量妙行者不離衆生自身自口自意而求也衆生之身口意無明為首便為十惡智慧為首番為十善又以智慧為首番而為十波羅蜜十波羅蜜十地等證名為等覺覺既等矣必等於相相覺不分而入於妙所謂妙覺妙斯妙矣妙妙圓明所謂圓覺圓覺者佛果也佛果者方有四八端嚴之相八十二種無上妙好者也不有如是之相安有如是之果不有如是之果安有如是之相如是之佛果如是之佛相可説有耶可説無耶可説無相中有相耶可説有相中無相耶雖然無方便中假立方便無佛相中假立佛相令諸衆生觀佛相好從何而生經云佛身者法身也從慈悲喜捨而生衆生即悟曰慈悲喜捨人亦能為不肯為也譬如周道皇皇進亦無阻退亦無阻進退由人非由道也我等衆生何莫由斯道也裹慈悲喜捨之糧駕三十七助之車御十八不共之驥進取佛果而證佛相寧癡癡蠢蠢甘忍塵勞莊飾人天世趣三惡業道之身相也耶書曰見賢思齊祖曰彼既丈夫我亦爾定光曰佛昔曾為我我安不成佛胡不思之胡不勉之豫因龍公之命敬於經首假立問答論而序之以發明人天瞻像之旨焉時乾隆六年佛成道日比丘定光界珠謹題佛像量度經序我佛廣大劫來天上人間龍宮魔窟胎卵濕化鱗甲羽毛塵塵剎剎無往不入故顯示三十二相八十種好使情與無情心明自性體證金剛婆婆和和四十九年三百餘會塵説剎説熾然説無間歇又道未曾説著隻字正所謂佛與衆生皆具一體同攝一用者也佛之相好始如優填王思佛命匠塑之佛對相云無為真佛實在我身脫然會得佛身即我身我身即佛身迄今三千年來大光明下普照支那間有明一善取一相不昧正因而佛之慈悲相好奚啻四八莊嚴八十妙好不過盡衆生之機見權示導引依相趨歸皆至如一善之所取焉況觀大地衆生説佛學佛語佛徹見佛頭腦目髓心肝毫髮不爽能使盡恆河沙衆生著得隻眼如其人者爰有大檀生緣烏朱穆秦部落自幼承聖祖仁皇帝鞠育之恩以為儀賓因其通西土之語世宗憲皇帝特留帝都以為西番學總理兼管翻譯之事焉其為人朴素鯁直聰敏恭謹出乎稠人之表豫得會敕修大藏乾隆元年同館事三年來形骸相忘脫非世比亦深知熏習善種無忘本得雖處塵塵之中無他所好惟耽心梵册酷嗜華言窺顛末察微芒盡其平生力是欲測佛智於中揀閲佛説造像量度儀經一帙遠朝市棲幽壑窮究歲月一心不問考佛出作入息差無漏明差無背向法相短長毫髮曲盡其妙其精如佛在世之無異焉時懷同歸一善之忱所患朝野邊邦明佛心依相歸或金銀銅鐵香木泥瓦繪素種種不一匠功巧拙精粗收分執相之訛而人心之慢是以見顏色而啓敬之心上格佛心下契愚衷功豈小補者哉欲壽梓流通問序於余豫訝然笑曰縱具通身手眼百千三昧曷敢向佛頭上著色乎然傅大士云夜夜抱佛眠朝朝還共起起坐鎮相隨語默同居止欲識佛性義祇者語聲是拈此一段可表大檀抱一式歷萬古不磨之因守一法結千秋香飄之果孰為佛耶孰不為佛耶鏡華水月之想幻化諸實之議旨哉此也瞥然一笑直與三世諸佛同一鼻孔出氣三世衆生同一體靜觀則像由之所生心佛亦然夫復何贅是為序乾隆七年歲在壬戌佛誕日楚黃嗣祖沙門明鼎拜書於京都萬壽符夢堂丈室佛像量度經序從來修佛果者六度為先成佛因者造像第一昔如來住世金相流輝原有量度古有造礦麥大像且獲福無疆況志心造像而不遵量度可乎漢唐以來此方國王大臣士庶緇流造像供養者不可勝紀然造者多而如法者少皆未得其真尺寸者也烏朱穆秦部落儀賓公內通五明留心佛典創譯造像量度經乃舍利弗之所請問如來親宣者也其中所説從頂至足分寸節度皆有法則縱橫大小毫釐不差未得流通於此土今儀賓公心存菩薩行利濟形於外常翻譯諸文悉皆成章意欲遺之無窮又遇靜覺國師出佛像圖式及量度經與其意相合於是刊布流行適灌頂大國師抱恙就浴溫泉公往問訊道經荒庵思在藏館同事接談之情故出所譯經卷示成人之美善必同歸余因而序之見其詞清義暢宛然有古昔房相之風兼繪像圖式雅有法度後之造像者依式而行無不感通福田其有窮乎法華經云聚沙為塔指爪畫佛皆為成佛正因況志心造像而遵量度者哉自漢至今世多訛謬相傳失其法則公今刊布流通遵佛量度若有善信人等發心造像依此準繩造繪聖容即同世尊在世親見如來將金璧交輝之聖像演六度之精嚴求得佛果有何難哉後之同志者幸勿忽諸乾隆七年佛出家日慈善比丘本誠記造像量度經引夫造像之藝其來尚矣梵志阿思陀二合仙子所作像傳曰人壽十萬歲時南洲有轉輪王名尾亞舍爾時有儒童夭殤其父被哀迷亂負尸號而奔闕妄犯啓言梵典頗載輪王治世民無非命今臣息如是其咎何歸速還吾子莫污聖揚如此纏綿不已舉朝無法解慰稍生不寧即時大梵天帝為護國王特遣毗首羯麻天子授之以圖畫之術物色儒童真容而令活之與其翁上下俱得歡悅梵天嘗讚曰山中妙高最鳥中惟大鵬人中如輪王藝中是丹青遂流傳於世間以為像藝之通原焉惟佛像之本則我佛中年之時中天竺國瓶沙王為遺遠友乞得世尊畫容為幀像之始時工被佛神光射眼眩目不能注視乃請世尊令坐河岸而謹取水中影相為式描得聖容因被微波由作曲彎長絲相故名謂水絲衣佛今儞波羅國所出佛像多有此樣其摹似乎唐吳道子觀音石像暮節舍利弗創受造像量度而優填王鏤檀造世尊立像是為如來胎偶之初於是流布五天竺之境矣其於土番則唐之貞觀中創興佛法前後纍使東土及天竺徵聘諸賢而賚取衆經一切五明典籍一聲明二因明三醫方明四工巧明五內明繼續翻譯準令國內公私立剎各隨其願力學習之夫三倚之造法乃工巧明部所收最為尊勝者也三倚者佛像為身倚佛身之相也神靈倚結此寓之以施人願也文字為語倚佛語之相也妙法倚凝此存之以備傳教訓也塔幢為心倚佛心之相也道德倚因此表之以示顯義理也又倚者依也衆生依此三相而發信見道明理又倚此作福田也梵語伽啼華云倚或翻因謂聖凡相結之因由也或翻作迹假此蹤迹引誘後人也亦通又像為色身倚文字及塔為法身倚而廟宇附之至於法輪鈴杵等物於一切工用之中最為尊勝也彼所出載經傳頗多而得其傳授者曼堇啾三氏惟精西來佛像什有八九靡非彼三家所出者相有大同小異而天下通稱藏佛藏翻江其地有江故名國中兩大邑聚一謂前藏一謂後藏賢愚同寶貴賤共持豈非分量盡得合式深有契於人心之故歟余先在恩師敕封弘教三藏廣智法王寶榻前親受密集曼那羅尺寸時並得佛像及塔之尺寸附安藏法要集偈番本雖未能熟習亦自知珍惜之蓋慎藏而弗失者有年矣今中土之佛像有所謂漢式者有所謂梵式者其所謂漢式者則漢武北伐胸奴得休屠金人安置於甘泉宮孝明西迎沙門受幀像創建洛都寺宇其後漸盛遍蔓自晉魏北朝六朝以至於宋代與西國通和公私往來時時不斷故多得西國佛像而唐之元奘法師遍歷五竺境共十有七載瞻禮世尊過化之地綜通其聲教大般若等經千有餘卷金玉佛像百什餘軀俱以大象載歸其像之精妙皆阿育王等所造者焉蓋自漢以來凡欲造佛像者皆取西來像為模工行家祖述相傳此所謂漢式者也或以謂唐式其所謂梵式者元世祖混一海宇之初儞波羅國匠人阿尼哥善為西域梵像從帝師巴思八來奉敕修明堂針炙銅像以工巧稱而其門人劉正奉以塑藝馳名天下因特設梵像提舉司專董繪畫佛像及土木刻削之工故其藝絶於古今遂稱為梵像此則所謂梵式者也儞波羅國在印土之北吐番之西其風俗出巧工蓋阿尼哥更超群者也故帝師特引來薦於帝也巴思八者華云聖亦是號而非名也名洛追建燦華云慧幢西番貴族敏悟非凡五明俱通世祖中統元年封國師授以玉印主統天下釋門後即封法號曰皇天之下一人之上開教宣文輔治大聖至德普覺真知佑國如意大寶法主西天佛子大元帝師因叔侄傳繫為吐番國總主按本傳世祖初命取明堂針炙銅像示之於阿尼哥曰此安撫王𮖹使宋時所進歲久闕壞無能修完者汝能新之乎對曰請試之至元二年新像成關鬲脈洛皆備金工歎其天巧莫不愧服劉正奉者姓劉名元字秉元薊之寶坻人其精藝非一而獨長於塑又從阿尼哥國公學西天梵相神思妙合遂為絶藝凡兩都名剎有塑土範金摶換佛相皆出元之手天下無與比官至昭文館大學士正奉大夫祕書監卿然迄今歷代竟未譯出其經傳若有離宗失迷口授尺度久訛不歸者固無可評正矣夫貴著貴相賤露賤貌裏存外現分毫不差昔如來以宿因三十二種大功德圓滿具足三十二種妙相而淨息凡夫八十種妄想因全備八十種隨形好示應化一切潤嚴者也八十種妄想者貪屬妄想四十種嗔屬三十三癡屬七種出祕密集會大教王經疏此其妙勝莊嚴豈可以無師之學謬為增損者哉蓋具幾分之準量則凝注幾分之神氣有神氣之力以能引彼衆生之愛敬心因以其愛敬心之輕重之分而因獲其攝受利益之大小此乃天理之自然也經云量度不準之像則正神不寓焉此豈工人之所易任者乎然則尺寸量度之為要務也明矣豫平素留意於斯然非用佛説經義莫能證鑑故每為之遲遲適陜西洮州敕賜禪定寺崇梵靜覺國師喇嘛來朝晤於公署偶談及此訓余曰舍利弗問造像量度經者最先詳且該子盍譯而行之豫聞之喜敬諾焉於是月餘而國師贈經之模本並圖像五篇俱擇日而程其功其中復有當資旁搜者亦各遍攬采取納於經間空處述之或別録類附於後仰賴佛力已獲垂成凡我同好永遠供為資糧矣因效番王佛陀阿布提二合所作五明傳略引而書於經首時乾隆七年佛從忉利天下還日依番九月二十二番學總管漠北工布查布謹識釋迦佛裸體之相也凡佛像壞質以此為模式釋迦佛著衣之相也凡化身佛相除手印及坐法幖幟之外概以是作為通式無量壽佛之像也凡報身佛像除手印坐相及幖幟之外皆以是作為通式文殊菩薩之像也凡菩薩天男相者除非手印坐法及幖幟之外概以是作為通式多囉菩薩像凡佛母天女相者除非手印等差別類其餘以此式可為通用焉本是世尊遊化乞食之相也今亦為彌陀接引相凡造諸佛菩薩立像者依此尺寸則無有失差矣其雙腳之按法乃依畫像之為也胎偶則趺面對并向前而兩踵間有四指而兩巨指根相去須作八指之分焉金剛杵式諸菩薩侍奉世尊在旁列立之像以此作式而有幖幟則其幖幟尖向上置於華心中不動明王像也以為諸明王忿怒相式如來滿月面菩薩雞子面佛母芝麻面明王四方面髮攢側歪者乃是依畫像之樣也若胎偶則從前直往後斜傾之周身惟面目最要故重出四面之像而復詳之因經文得其尺寸以圖樣明其運法則引學之綱領備矣夫辭之所不得詮圖之所未能盡者則在乎學者思慧之力也
